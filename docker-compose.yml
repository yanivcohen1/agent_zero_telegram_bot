services:
  firewall:
    image: alpine:latest
    container_name: agent-zero-firewall
    cap_add:
      - NET_ADMIN
    ports:
      - "5000:80"
    command: >
      sh -c "
        apk add --no-cache iptables &&
        iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT &&
        iptables -A OUTPUT -d 192.168.0.155 -p tcp --dport 11434 -j ACCEPT &&
        iptables -A OUTPUT -d 192.168.0.0/16 -j DROP &&
        iptables -A OUTPUT -d 10.0.0.0/8 -j DROP &&
        iptables -A OUTPUT -d 172.16.0.0/12 -j DROP &&
        echo 'Firewall rules applied successfully.' &&
        tail -f /dev/null
      "

  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: agent-zero-isolated
    network_mode: "service:firewall"
    depends_on:
      - firewall
    environment:
      - OLLAMA_URL=http://192.168.0.155:11434

  bot:
    image: python:3.12-slim
    container_name: agent-zero-telegram-bot
    depends_on:
      - firewall
      - agent-zero
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - MY_USER_ID=${MY_USER_ID}
      - AGENT_ZERO_URL=http://firewall:80
      - AGENT_ZERO_API_KEY=${AGENT_ZERO_API_KEY}
      - ENVIRONMENT=production
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python agent_zero_telegram_bot.py"